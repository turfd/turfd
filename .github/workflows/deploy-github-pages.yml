# Builds on every push to main — you do not need to run `npm run build` locally before pushing.
# The site GitHub Pages serves is always the artifact from this job, not files committed to the repo.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # `readReleaseNotesFromGit` / Discord dedupe walk `git log --skip`; depth-1 clones break that.
          fetch-depth: 0
      # `secrets` cannot be used in step `if:` — resolve var-or-secret here and gate later steps via output.
      - name: Discord changelog — is posting enabled?
        id: discord_changelog_post
        env:
          POST_VAR: ${{ vars.DISCORD_CHANGELOG_POST }}
          POST_SECRET: ${{ secrets.DISCORD_CHANGELOG_POST }}
        run: |
          if [ "$POST_VAR" = "true" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Discord changelog: posting enabled (variable DISCORD_CHANGELOG_POST; digest + post after build)."
          elif [ "$POST_SECRET" = "true" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Discord changelog: posting enabled (secret DISCORD_CHANGELOG_POST). Prefer Actions → Variables — the toggle is not sensitive."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Discord changelog: posting DISABLED — set variable or secret DISCORD_CHANGELOG_POST to exactly \"true\" (not True/1). Variable value: \"${POST_VAR:-<unset>}\". Also add secret DISCORD_WEBHOOK_URL_CHANGELOG."
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - name: Write Discord dedupe digest
        if: steps.discord_changelog_post.outputs.enabled == 'true'
        env:
          DISCORD_CHANGELOG_DEDUPE_BUSTER: ${{ vars.DISCORD_CHANGELOG_DEDUPE_BUSTER || secrets.DISCORD_CHANGELOG_DEDUPE_BUSTER }}
        run: |
          mkdir -p .cache
          npx tsx scripts/printDiscordChangelogDedupeKey.ts "$GITHUB_WORKSPACE" > .cache/discord-dedupe.txt
      - name: Ensure Discord cache marker
        if: steps.discord_changelog_post.outputs.enabled == 'true'
        run: mkdir -p .cache && echo ok > .cache/discord-changelog-sentinel
      - name: Discord changelog cache
        if: steps.discord_changelog_post.outputs.enabled == 'true'
        id: discord_cache
        uses: actions/cache@v4
        with:
          path: .cache/discord-changelog-sentinel
          key: stratum-discord-changelog-${{ hashFiles('.cache/discord-dedupe.txt') }}
      - name: Post Discord changelog
        if: steps.discord_changelog_post.outputs.enabled == 'true' && steps.discord_cache.outputs.cache-hit != 'true'
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL_CHANGELOG: ${{ secrets.DISCORD_WEBHOOK_URL_CHANGELOG }}
          DISCORD_CHANGELOG_EMBED_COLOR: ${{ secrets.DISCORD_CHANGELOG_EMBED_COLOR }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL_CHANGELOG:-}" ]; then
            echo "::warning::DISCORD_CHANGELOG_POST is true but DISCORD_WEBHOOK_URL_CHANGELOG is empty — skipping post."
            exit 0
          fi
          echo "Posting Discord changelog (cache miss for this notes/version digest)."
          npx tsx scripts/postDiscordChangelog.ts "$GITHUB_WORKSPACE"
      - name: Discord changelog skipped (dedupe)
        if: steps.discord_changelog_post.outputs.enabled == 'true' && steps.discord_cache.outputs.cache-hit == 'true'
        run: 'echo "::notice::Discord changelog skipped — same version+notes digest as a previous run. Bump DISCORD_CHANGELOG_DEDUPE_BUSTER (variable or secret) to force a repost."'
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

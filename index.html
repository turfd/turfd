<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Hints for caches; CDN may still override. Stale clients also get `build.json` compare in JS. -->
    <meta http-equiv="Cache-Control" content="no-cache" />
    <meta http-equiv="Pragma" content="no-cache" />
    <title>Stratum</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect fill='%2374b3ff' width='32' height='32' rx='6'/%3E%3C/svg%3E"
    />
    <!-- Match {@link MENU_SKY_FALLBACK_GRADIENT} / menuSkyPaint so the shell matches the menu before JS runs. -->
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: linear-gradient(180deg, #74b3ff 0%, #a8d8ff 52%, #6a8a9a 100%);
        background-color: #6a8a9a;
        overscroll-behavior: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

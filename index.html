<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Stratum</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect fill='%2374b3ff' width='32' height='32' rx='6'/%3E%3C/svg%3E"
    />
    <!-- Menu sky top (#74b3ff) so the shell isn’t white before the JS bundle runs. -->
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        /* iOS Safari: avoid 100vh/layout gaps vs the visible viewport */
        min-height: -webkit-fill-available;
        background: #74b3ff;
      }
      #app {
        min-height: 100%;
        min-height: -webkit-fill-available;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
